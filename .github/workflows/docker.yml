name: Docker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # midnight UTC every day
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master

permissions: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/arti

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.runs-on }}
    permissions:
      packages: write
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - run: lscpu
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.33.1
        with:
          cache-binary: false
          version: latest
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}-${{ matrix.arch }}
          build-args: >-
            ${{ github.event_name == 'schedule' && 'VERSION=main' ||
                startsWith(github.ref, 'refs/tags/') && format('VERSION={0}', github.ref_name) || '' }}
          no-cache: ${{ github.event_name == 'schedule' }}
          cache-from: |
            type=gha,scope=docker-build-${{ matrix.arch }}${{ github.event_name == 'schedule' && '-scheduled' || '' }}
          cache-to: |
            type=gha,mode=max,scope=docker-build-${{ matrix.arch }}${{ github.event_name == 'schedule' && '-scheduled' || '' }}
          context: .

  push:
    name: Push
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.33.1
        with:
          cache-binary: false
          version: latest
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # For scheduled nightly builds
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' }}
            type=raw,value={{date 'YYYYMMDD'}},enable=${{ github.event_name == 'schedule' }}
            # For non-tag events
            type=ref,event=branch,enable=${{ github.event_name != 'schedule' }}
            type=ref,event=pr
            # For tag events, generate versions
            type=match,pattern=arti-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=arti-v(\d+\.\d+),group=1
            type=match,pattern=arti-v(\d+),group=1
      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE: ${{ env.IMAGE }}
          SHA: ${{ github.sha }}
        run: |-
          echo "$TAGS" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              echo "Creating manifest for: $tag"
              docker buildx imagetools create \
                --tag "$tag" \
                "${IMAGE}:sha-${SHA}-amd64" \
                "${IMAGE}:sha-${SHA}-arm64"
            fi
          done
